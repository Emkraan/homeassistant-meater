name: Feature request
description: Suggest a new entity, capability, or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the *outcome* you want, not just the implementation — that helps evaluate whether the BLE protocol or a cloud supplement can actually support it.

        This integration reads the MEATER+ probe **locally over Bluetooth**. Features that require cloud data (cook name, target temperature, ETA) are possible but depend on the [MEATER public REST API](https://github.com/apption-labs/meater-cloud-public-rest-api).

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: "e.g. I want to trigger an automation when the cook reaches a specific target temperature, but there's no target temp entity."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      placeholder: "e.g. Add an optional cloud supplement that pulls target temp and ETA from the MEATER REST API and exposes them as additional sensors."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways you've thought about solving this — template sensors, automations, companion apps, etc.

  - type: dropdown
    id: data_source
    attributes:
      label: Does this feature require cloud data, or can it be derived locally from BLE?
      options:
        - Local BLE only — no cloud needed
        - Requires MEATER cloud API
        - Not sure
    validations:
      required: true

  - type: textarea
    id: ble_evidence
    attributes:
      label: BLE / API evidence (optional but very helpful)
      description: |
        If you've inspected BLE advertisements, GATT characteristics, or the MEATER REST API and found data that would back this feature, paste the details here.
      render: text

  - type: input
    id: probe_model
    attributes:
      label: MEATER probe model
      placeholder: "e.g. MEATER+"

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues for similar requests.
          required: true
        - label: I understand this integration reads BLE locally and some features may require cloud data.
          required: true
